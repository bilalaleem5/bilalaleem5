<svg width="1200" height="240" viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0d1a04"/>
      <stop offset="100%" stop-color="#1a2e08"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CCFF00"/>
      <stop offset="60%" stop-color="#EEFF77"/>
      <stop offset="100%" stop-color="#CCFF00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bgGrad)"/>

  <!-- Top green accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#CCFF00" opacity="0.9"/>

  <!-- Decorative dots scattered -->
  <circle cx="80" cy="200" r="2" fill="#CCFF00" opacity="0.4"/>
  <circle cx="130" cy="170" r="1.5" fill="#CCFF00" opacity="0.3"/>
  <circle cx="50" cy="140" r="1" fill="#CCFF00" opacity="0.2"/>
  <circle cx="1100" cy="50" r="2" fill="#CCFF00" opacity="0.4"/>
  <circle cx="1150" cy="90" r="1.5" fill="#CCFF00" opacity="0.3"/>
  <circle cx="1080" cy="130" r="1" fill="#CCFF00" opacity="0.2"/>
  <circle cx="200" cy="30" r="1.5" fill="#CCFF00" opacity="0.25"/>
  <circle cx="950" cy="210" r="1.5" fill="#CCFF00" opacity="0.25"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#CCFF00" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="180" x2="1200" y2="180" stroke="#CCFF00" stroke-width="0.3" opacity="0.08"/>
  <line x1="300" y1="0" x2="300" y2="240" stroke="#CCFF00" stroke-width="0.3" opacity="0.05"/>
  <line x1="900" y1="0" x2="900" y2="240" stroke="#CCFF00" stroke-width="0.3" opacity="0.05"/>

  <!-- Main name -->
  <text x="600" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">BILAL ALEEM</text>

  <!-- Subtitle -->
  <text x="600" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="400" fill="#d4d4d4" text-anchor="middle">AI Engineer — Multi-Agent Systems · RAG Pipelines · LLM Automation</text>

  <!-- Divider line -->
  <rect x="380" y="163" width="440" height="1.5" fill="#CCFF00" opacity="0.5"/>

  <!-- Tags row -->
  <text x="600" y="195" font-family="'Fira Code', 'Courier New', monospace" font-size="13.5" fill="#CCFF00" text-anchor="middle" opacity="0.9" filter="url(#softglow)">LangChain · LangGraph · Claude API · FastAPI · n8n · Voice AI</text>

  <!-- Open to work badge -->
  <rect x="495" y="208" width="210" height="22" rx="11" fill="#CCFF00" opacity="0.12"/>
  <text x="600" y="223" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#CCFF00" text-anchor="middle">🟢  Open to Full-Time / Remote Roles</text>

  <!-- Bottom green accent line -->
  <rect x="0" y="237" width="1200" height="3" fill="#CCFF00" opacity="0.5"/>
</svg>
