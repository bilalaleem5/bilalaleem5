name: Generate Metrics Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [ main ]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. 3D Contribution Calendar ──
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bilalaleem5
          filename: github-calendar.svg
          template: classic
          config_timezone: Asia/Karachi
          config_display: large
          config_padding: 6%, 10%-1%
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── 2. Snake animation eating contributions ──
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: bilalaleem5
          outputs: |
            github-snake-dark.svg?palette=github-dark&color_dot_empty=1a1a1a&color_dot_0=1a2e05&color_dot_1=2d5a0e&color_dot_2=5a9e1e&color_dot_3=8fd62e&color_dot_4=CCFF00&color_snake=CCFF00
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}

      # ── 3. Commit all generated files ──
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh metrics & snake"
          file_pattern: "*.svg"
