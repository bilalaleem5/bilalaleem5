name: Generate Metrics Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [ main ]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. Stats card (activity + repos + languages + lines) ──
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bilalaleem5
          filename: github-stats.svg
          template: classic
          config_timezone: Asia/Karachi
          config_display: large
          config_padding: 8%, 10%-1%

          base: header, activity, community, repositories, metadata

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%

          plugin_lines: yes
          plugin_lines_sections: base

      # ── 2. 3D Contribution Calendar (isolated, full year) ──
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bilalaleem5
          filename: github-calendar.svg
          template: classic
          config_timezone: Asia/Karachi
          config_display: large
          config_padding: 6%, 10%-1%

          base: ""

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
