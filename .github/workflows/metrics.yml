name: Generate Metrics Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [ main ]

jobs:

  # ── Job 1: Snake animation ──────────────────────────────────
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: bilalaleem5
          outputs: |
            github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}

      - name: Commit snake SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-snake-dark.svg
          git diff --staged --quiet || git commit -m "chore: update snake animation"
          git push

  # ── Job 2: 3D Calendar (runs after snake commits) ───────────
  calendar:
    runs-on: ubuntu-latest
    needs: snake
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bilalaleem5
          filename: github-calendar.svg
          template: classic
          config_timezone: Asia/Karachi
          config_display: large
          config_padding: 6%, 10%-1%
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
